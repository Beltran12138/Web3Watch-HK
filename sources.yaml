# Alpha Radar 数据源配置文件
# 使用 YAML 格式，便于动态添加/修改数据源而无需改代码

# =============================================================================
# 高频数据源（T0：3-5 分钟级别）
# =============================================================================
high_frequency:
  - name: SFC
    type: rss
    url: https://www.sfc.hk/en/RSS-feed/Regulatory-news
    tier: high
    enabled: true
    maxAgeHours: 168
    pushCooldownHours: 48
    description: "香港证监会监管新闻"

  - name: Binance
    type: rss
    url: https://www.binance.com/en/feed/news
    tier: high
    enabled: true
    maxAgeHours: 48
    pushCooldownHours: 24
    description: "币安官方新闻"

  - name: OKX
    type: rss
    url: https://www.okx.com/webapi/common/rss?lang=en-US
    tier: high
    enabled: true
    maxAgeHours: 48
    pushCooldownHours: 24
    description: "OKX 官方新闻"

  - name: TwitterKOLs
    type: twitter
    accounts:
      - username: _FORAB
        name: TwitterAB
      - username: colinwu
        name: WuShuo
      - username: PhyrexNi
        name: Phyrex
      - username: justinsuntron
        name: JustinSun
      - username: xiejiayinBitget
        name: XieJiayin
    tier: high
    enabled: true
    maxAgeHours: 24
    pushCooldownHours: 12
    description: "KOL Twitter 账号聚合"

  - name: PolymarketBreaking
    type: rss
    url: https://polymarket.com/rss/breaking
    tier: high
    enabled: true
    maxAgeHours: 24
    pushCooldownHours: 12
    description: "Polymarket 突发新闻"

  - name: PolymarketChina
    type: rss
    url: https://polymarket.com/rss/china
    tier: high
    enabled: true
    maxAgeHours: 24
    pushCooldownHours: 12
    description: "Polymarket 中国相关新闻"

# =============================================================================
# 低频数据源（T1：15-30 分钟级别）
# =============================================================================
low_frequency:
  - name: TechFlow
    type: rss
    url: https://www.techflowpost.com/rss
    tier: low
    enabled: true
    maxAgeHours: 72
    pushCooldownHours: 24
