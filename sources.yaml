# =============================================================================
# 全局设置
# =============================================================================
settings:
  # 默认配置（未明确配置的源使用此默认值）
  defaults:
    maxAgeHours: 48
    enableStrictTimestamp: false
    dedupMode: normal  # strict | normal | loose
    pushCooldownHours: 24
  
  # 爬虫批次设置
  scraper:
    batchSize: 4
    batchDelayMs: 2000
    aiDelayMs: 2000
    maxAiCallsPerRun: 60
  
  # AI 成本控制
  ai:
    dailyBudgetUsd: 10
    costPer1kTokens: 0.001
    alertThreshold: 0.8
