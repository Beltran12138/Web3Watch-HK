  - name: PRNewswire
    type: rss
    url: https://www.prnewswire.com/rss/news-provides-general-news-feeds
    tier: low
    enabled: true
    maxAgeHours: 24
    pushCooldownHours: 24
    description: "美通社企业新闻稿"
    keywords:
      include: ["hashkey", "osl", "exio", "matrixport", "bitv", "binance", "okx"]
      exclude: []

