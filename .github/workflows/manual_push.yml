name: 快讯推送

on:
  workflow_dispatch:
    inputs:
      title:
        description: '快讯标题'
        required: true
      url:
        description: '原文链接（可选）'
        required: false
        default: ''
      category:
        description: '业务分类'
        required: false
        default: '合规'
        type: choice
        options:
          - 合规
          - 产品
          - 市场
          - 技术
          - 投融资
          - 其他

jobs:
  manual-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (skip scripts)
        run: npm ci --ignore-scripts

      - name: Build better-sqlite3 from source
        run: npx node-gyp rebuild --release
        working-directory: node_modules/better-sqlite3

      - name: Push news
        run: node run_manual_push.js
        env:
          WECOM_WEBHOOK_URL:  ${{ secrets.WECOM_WEBHOOK_URL }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          USE_SUPABASE:       'true'
          MANUAL_TITLE:       ${{ inputs.title }}
          MANUAL_URL:         ${{ inputs.url }}
          MANUAL_CATEGORY:    ${{ inputs.category }}
