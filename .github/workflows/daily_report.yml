name: Daily Report

on:
  schedule:
    # 每天北京时间 18:00 (= UTC 10:00)
    # 注意：GitHub Actions cron 可能延迟 5-30 分钟
    - cron: '0 10 * * *'
  workflow_dispatch: # 手动触发

# 防止多个日报实例并发运行
concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Skip if already ran today
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RUNS=$(gh run list \
            --workflow=daily_report.yml \
            --repo "$GITHUB_REPOSITORY" \
            --json createdAt,conclusion \
            --jq "[.[] | select(.createdAt | startswith(\"$TODAY\")) | select(.conclusion == \"success\")] | length")
          echo "Successful runs today: $RUNS"
          if [ "$RUNS" -gt "0" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "[Check] Daily report already ran successfully today. Skipping."
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "[Check] No successful run today. Proceeding."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  daily-report:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (skip scripts)
        run: npm ci --ignore-scripts

      - name: Build better-sqlite3 from source
        run: npx node-gyp rebuild --release
        working-directory: node_modules/better-sqlite3

      - name: Run Daily Report
        id: report
        run: node run_daily_report.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          USE_SUPABASE: 'true'
          DEBUG: 'true'

      - name: Retry on failure
        if: failure()
        run: |
          echo "[Retry] First attempt failed, retrying in 30s..."
          sleep 30
          node run_daily_report.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          USE_SUPABASE: 'true'
          DEBUG: 'true'
